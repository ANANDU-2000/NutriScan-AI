# Render Blueprint — Web service from /backend (commit to repo root).
# Dashboard: connect this repo; if not using Blueprint, set Root Directory = backend manually.
services:
  - type: web
    name: nutriscan-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
